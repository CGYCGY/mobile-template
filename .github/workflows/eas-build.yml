# EAS Build pipeline.
#
# Required GitHub secrets:
#   EXPO_TOKEN          — generate via `eas login` then `eas whoami --json` or
#                         the Expo dashboard (Access Tokens). Scope: project.
#
# Optional secrets (if you upload to Sentry from CI rather than as an EAS secret):
#   SENTRY_AUTH_TOKEN   — Sentry org auth token for sourcemap upload during build.
#                         Prefer storing this as an EAS secret instead so it's
#                         available across all build environments.

name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - ios
          - android
          - all
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'stores/**'
      - 'convex/**'
      - 'app.config.ts'
      - 'eas.json'
      - 'package.json'
      - 'bun.lock'

jobs:
  build:
    name: EAS Build (${{ inputs.profile || 'preview' }} / ${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify Expo authentication
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Run EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PROFILE: ${{ inputs.profile || 'preview' }}
          PLATFORM: ${{ inputs.platform || 'all' }}
        run: eas build --non-interactive --no-wait --profile "$PROFILE" --platform "$PLATFORM"
